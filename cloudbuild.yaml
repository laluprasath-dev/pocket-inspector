# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build CI/CD pipeline for Pocket Inspector Backend
#
# Triggered on every push to `main`.
# Steps:
#   1. Build Docker image
#   2. Push to Artifact Registry
#   3. Deploy to Cloud Run
#
# Required Cloud Build substitution variables (set in the trigger):
#   _REGION          — GCP region, e.g. europe-west2
#   _SERVICE         — Cloud Run service name, e.g. pocket-inspector-api
#   _AR_REPO         — Artifact Registry repo name, e.g. pocket-inspector
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: europe-west2
  _SERVICE: pocket-inspector-api
  _AR_REPO: pocket-inspector

steps:
  # ── 1. Build the Docker image ────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  # ── 2. Push image to Artifact Registry ──────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}

  # ── 3. Deploy to Cloud Run ───────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --service-account
      - pocket-inspector-storage@$PROJECT_ID.iam.gserviceaccount.com
      - --add-cloudsql-instances
      - $PROJECT_ID:${_REGION}:pocket-inspector-db
      - --set-secrets
      - DATABASE_URL=pocket-inspector-db-url:latest,JWT_SECRET=pocket-inspector-jwt-secret:latest,JWT_REFRESH_SECRET=pocket-inspector-jwt-refresh-secret:latest,FIREBASE_SERVICE_ACCOUNT_KEY=pocket-inspector-firebase-key:latest
      - --set-env-vars
      - NODE_ENV=production,PORT=3000,GCS_PROJECT_ID=$PROJECT_ID,GCS_BUCKET_NAME=pocket-inspector-prod-bucket,FCM_PROJECT_ID=$PROJECT_ID
      - --allow-unauthenticated
      - --min-instances
      - "1"
      - --max-instances
      - "10"
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --timeout
      - 60s
      - --concurrency
      - "80"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest

options:
  logging: LEGACY
  machineType: E2_HIGHCPU_8
